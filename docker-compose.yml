version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lumen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumen
      POSTGRES_PASSWORD: lumen
      POSTGRES_DB: lumen
    ports:
      - '5433:5432'
    volumes:
      - lumen_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lumen']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lumen-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - lumen_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lumen_postgres_data:
  lumen_redis_data:
